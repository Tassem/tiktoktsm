openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: niches
    description: Niche workspace operations
  - name: provider-settings
    description: AI provider settings operations
  - name: analyses
    description: Reel analysis operations
  - name: prompt-packs
    description: Prompt pack operations
  - name: dashboard
    description: Dashboard operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /niches:
    get:
      operationId: listNiches
      tags: [niches]
      summary: List niches
      responses:
        "200":
          description: Niches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Niche"
    post:
      operationId: createNiche
      tags: [niches]
      summary: Create niche
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNicheRequest"
      responses:
        "201":
          description: Created niche
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Niche"
        "400":
          $ref: "#/components/responses/BadRequest"
  /niches/{nicheId}:
    get:
      operationId: getNiche
      tags: [niches]
      summary: Get niche
      parameters:
        - $ref: "#/components/parameters/NicheId"
      responses:
        "200":
          description: Niche
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Niche"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateNiche
      tags: [niches]
      summary: Update niche
      parameters:
        - $ref: "#/components/parameters/NicheId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNicheRequest"
      responses:
        "200":
          description: Updated niche
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Niche"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteNiche
      tags: [niches]
      summary: Delete niche
      parameters:
        - $ref: "#/components/parameters/NicheId"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"
  /provider-settings:
    get:
      operationId: getProviderSettings
      tags: [provider-settings]
      summary: Get AI provider settings
      responses:
        "200":
          description: Provider settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderSettings"
    put:
      operationId: updateProviderSettings
      tags: [provider-settings]
      summary: Update AI provider settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProviderSettingsRequest"
      responses:
        "200":
          description: Provider settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderSettings"
        "400":
          $ref: "#/components/responses/BadRequest"
  /analyses:
    get:
      operationId: listAnalyses
      tags: [analyses]
      summary: List reel analyses
      parameters:
        - name: nicheId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Analyses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReelAnalysis"
    post:
      operationId: createAnalysis
      tags: [analyses]
      summary: Analyze reel and create prompt pack
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnalysisRequest"
      responses:
        "201":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Provider not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /prompt-packs:
    get:
      operationId: listPromptPacks
      tags: [prompt-packs]
      summary: List prompt packs
      parameters:
        - name: nicheId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Prompt packs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PromptPackSummary"
  /prompt-packs/{promptPackId}:
    get:
      operationId: getPromptPack
      tags: [prompt-packs]
      summary: Get prompt pack with scenes
      parameters:
        - $ref: "#/components/parameters/PromptPackId"
      responses:
        "200":
          description: Prompt pack
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromptPackDetail"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updatePromptPack
      tags: [prompt-packs]
      summary: Update prompt pack
      parameters:
        - $ref: "#/components/parameters/PromptPackId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePromptPackRequest"
      responses:
        "200":
          description: Updated prompt pack
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromptPackDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deletePromptPack
      tags: [prompt-packs]
      summary: Delete prompt pack
      parameters:
        - $ref: "#/components/parameters/PromptPackId"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"
  /prompt-packs/{promptPackId}/remix:
    post:
      operationId: remixPromptPack
      tags: [prompt-packs]
      summary: Remix a prompt pack with a new story concept
      parameters:
        - $ref: "#/components/parameters/PromptPackId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RemixPromptPackRequest"
      responses:
        "201":
          description: New remixed prompt pack
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromptPackDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          description: AI generation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /dashboard-summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
  /recent-activity:
    get:
      operationId: listRecentActivity
      tags: [dashboard]
      summary: List recent activity
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"
components:
  parameters:
    NicheId:
      name: nicheId
      in: path
      required: true
      schema:
        type: integer
    PromptPackId:
      name: promptPackId
      in: path
      required: true
      schema:
        type: integer
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ApiError:
      type: object
      properties:
        error:
          type: string
        details:
          type: string
      required:
        - error
    Niche:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        audience:
          type: string
        contentAngle:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - description
        - audience
        - contentAngle
        - createdAt
        - updatedAt
    CreateNicheRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        audience:
          type: string
        contentAngle:
          type: string
      required:
        - name
        - description
        - audience
        - contentAngle
    UpdateNicheRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        audience:
          type: string
        contentAngle:
          type: string
    ProviderSettings:
      type: object
      properties:
        id:
          type: integer
        providerName:
          type: string
        model:
          type: string
        baseUrl:
          type: string
          nullable: true
        apiKeyConfigured:
          type: boolean
        apiKeyLastFour:
          type: string
          nullable: true
        realAnalysisEnabled:
          type: boolean
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - providerName
        - model
        - baseUrl
        - apiKeyConfigured
        - apiKeyLastFour
        - realAnalysisEnabled
        - updatedAt
    UpdateProviderSettingsRequest:
      type: object
      properties:
        providerName:
          type: string
          minLength: 1
        model:
          type: string
          minLength: 1
        baseUrl:
          type: string
          nullable: true
        apiKey:
          type: string
          nullable: true
        clearApiKey:
          type: boolean
      required:
        - providerName
        - model
    CreateAnalysisRequest:
      type: object
      properties:
        nicheId:
          type: integer
        reelUrl:
          type: string
        reelNotes:
          type: string
        concept:
          type: string
        demoMode:
          type: boolean
        videoFrames:
          type: array
          description: JPEG data URLs extracted from the uploaded video for real visual analysis.
          items:
            type: string
          maxItems: 32
        videoDataUrl:
          type: string
          description: Original uploaded video as a data URL so the server can extract and transcribe audio for full analysis.
      required:
        - nicheId
        - reelNotes
        - concept
        - demoMode
    ReelAnalysis:
      type: object
      properties:
        id:
          type: integer
        nicheId:
          type: integer
        nicheName:
          type: string
        reelUrl:
          type: string
          nullable: true
        reelNotes:
          type: string
        concept:
          type: string
        status:
          type: string
          enum: [completed, failed]
        summaryPrompt:
          type: string
        providerMode:
          type: string
          enum: [demo, provider]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - nicheId
        - nicheName
        - reelUrl
        - reelNotes
        - concept
        - status
        - summaryPrompt
        - providerMode
        - createdAt
    AnalysisResult:
      type: object
      properties:
        analysis:
          $ref: "#/components/schemas/ReelAnalysis"
        promptPack:
          $ref: "#/components/schemas/PromptPackDetail"
      required:
        - analysis
        - promptPack
    PromptPackSummary:
      type: object
      properties:
        id:
          type: integer
        nicheId:
          type: integer
          nullable: true
        nicheName:
          type: string
        analysisId:
          type: integer
        title:
          type: string
        concept:
          type: string
        summaryPrompt:
          type: string
          nullable: true
        sceneCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        sourceType:
          type: string
          enum: [original, remix]
      required:
        - id
        - nicheId
        - nicheName
        - analysisId
        - title
        - concept
        - summaryPrompt
        - sceneCount
        - createdAt
        - sourceType
    UpdatePromptPackRequest:
      type: object
      properties:
        nicheId:
          type: integer
      required:
        - nicheId
    RemixPromptPackRequest:
      type: object
      properties:
        storyIdea:
          type: string
          minLength: 10
          description: The new story concept or scenario to remix into (e.g. different characters, new plot)
        concept:
          type: string
          description: Short title for the new remixed pack
        nicheId:
          type: integer
          description: Optional niche to assign the remixed pack to
      required:
        - storyIdea
    PromptPackDetail:
      allOf:
        - $ref: "#/components/schemas/PromptPackSummary"
        - type: object
          properties:
            scenes:
              type: array
              items:
                $ref: "#/components/schemas/ScenePrompt"
          required:
            - scenes
    ScenePrompt:
      type: object
      properties:
        id:
          type: integer
        promptPackId:
          type: integer
        sceneNumber:
          type: integer
        sceneType:
          type: string
          enum: [hook, scene]
        title:
          type: string
        imagePrompt:
          type: string
        animationPrompt:
          type: string
        voiceOverDarija:
          type: string
        soundEffectsPrompt:
          type: string
      required:
        - id
        - promptPackId
        - sceneNumber
        - sceneType
        - title
        - imagePrompt
        - animationPrompt
        - voiceOverDarija
        - soundEffectsPrompt
    DashboardSummary:
      type: object
      properties:
        nicheCount:
          type: integer
        promptPackCount:
          type: integer
        sceneCount:
          type: integer
        analysisCount:
          type: integer
        providerConfigured:
          type: boolean
        lastPromptPackTitle:
          type: string
          nullable: true
      required:
        - nicheCount
        - promptPackCount
        - sceneCount
        - analysisCount
        - providerConfigured
        - lastPromptPackTitle
    ActivityItem:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [niche, analysis, prompt_pack]
        title:
          type: string
        detail:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - title
        - detail
        - createdAt
